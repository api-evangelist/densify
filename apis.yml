apis:
  - aid: densify:public-cloud-api
    name: Densify Public Cloud API
    description: >-
      The Densify Public Cloud REST API exposes optimization analysis, recommendations,
      account and instance inventory, and systems data for AWS, Azure, and Google
      Cloud environments. The API uses JSON over HTTPS, follows a resource-oriented
      design under the /api/v2/ path, and authenticates with JWT bearer tokens
      obtained from the /authorize endpoint. Common use cases include integrating
      right-sizing recommendations into Terraform, CloudFormation, and CI/CD pipelines.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.densify.com/docs-api/WebHelp_Densify_API_Cloud/Content/API_Guide/Introduction.htm
    baseURL: https://api.densify.com/api/v2
    tags:
      - Cloud
      - FinOps
      - Optimization
      - Recommendations
      - Right-Sizing
    properties:
      - type: Documentation
        url: https://www.densify.com/docs-api/WebHelp_Densify_API_Cloud/Content/API_Guide/Introduction.htm
      - type: Reference
        url: https://www.densify.com/docs/WebHelp_Densify_Cloud/Content/Resources/PDFs/Densify-API-Reference-Guide.pdf
      - type: Postman
        url: https://www.densify.com/dev
    contact:
      - FN: Densify Support
        email: support@densify.com
        url: https://www.densify.com/contact
  - aid: densify:container-api
    name: Densify Container Optimization API
    description: >-
      The Densify Container Optimization REST API provides programmatic access
      to container right-sizing recommendations across Amazon EKS, AKS, GKE,
      OpenShift, and self-managed Kubernetes footprints. It exposes endpoints
      for clusters, namespaces, controllers, container groups, and recommended
      requests/limits for CPU and memory based on machine learned utilization
      patterns.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.densify.com/docs-api/WebHelp_Densify_API/Content/Densify_API.htm
    baseURL: https://api.densify.com/api/v2
    tags:
      - Containers
      - Kubernetes
      - Optimization
      - Recommendations
      - Right-Sizing
    properties:

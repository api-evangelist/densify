openapi: 3.1.0
info:
  title: Densify / Kubex Public Cloud API
  description: |
    REST API for the Densify (now Kubex) cloud and container optimization platform.
    Exposes optimization analysis triggers and recommendation retrieval for AWS, Azure,
    GCP, and Kubernetes environments so that resource right-sizing can be embedded into
    CI/CD pipelines and FinOps workflows.
  version: "1.0.0"
  contact:
    name: Kubex
    url: https://docs.kubex.ai/
servers:
  - url: https://{instance}.densify.com/CIRBA/api/v2
    description: Densify / Kubex tenant instance
    variables:
      instance:
        default: customer
        description: Customer-specific subdomain
security:
  - bearerAuth: []
paths:
  /authorize:
    post:
      summary: Authorize and obtain JWT
      description: Submit valid credentials for an active, API-enabled Kubex user. Returns a JWT bearer token for subsequent calls.
      operationId: authorize
      security: []
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, password]
              properties:
                user:
                  type: string
                  description: Kubex username
                password:
                  type: string
                  format: password
                  description: Kubex password
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  apiToken:
                    type: string
                    description: JWT bearer token
        "401":
          description: Invalid credentials
  /ping:
    get:
      summary: Connectivity check
      description: Verify the API subsystem is reachable.
      operationId: ping
      tags: [System]
      responses:
        "200":
          description: API is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
  /analysis/aws:
    post:
      summary: Start AWS data collection / analysis
      operationId: startAwsAnalysis
      tags: [Cloud Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisAccepted"
  /analysis/azure:
    post:
      summary: Start Azure data collection / analysis
      operationId: startAzureAnalysis
      tags: [Cloud Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisAccepted"
  /analysis/gcp:
    post:
      summary: Start GCP data collection / analysis
      operationId: startGcpAnalysis
      tags: [Cloud Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisAccepted"
  /analysis/aws/{analysisId}/recommendations:
    get:
      summary: Retrieve AWS optimization recommendations
      operationId: getAwsRecommendations
      tags: [Recommendations]
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationList"
  /analysis/azure/{analysisId}/recommendations:
    get:
      summary: Retrieve Azure optimization recommendations
      operationId: getAzureRecommendations
      tags: [Recommendations]
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationList"
  /analysis/gcp/{analysisId}/recommendations:
    get:
      summary: Retrieve GCP optimization recommendations
      operationId: getGcpRecommendations
      tags: [Recommendations]
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationList"
  /kubernetes/clusters:
    get:
      summary: List monitored Kubernetes clusters
      operationId: listKubernetesClusters
      tags: [Kubernetes]
      responses:
        "200":
          description: Cluster list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cluster"
  /kubernetes/clusters/{clusterName}/containers:
    get:
      summary: Get container recommendations for a cluster
      operationId: getKubernetesContainers
      tags: [Kubernetes]
      parameters:
        - name: clusterName
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Container recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerRecommendation"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema: { type: string }
  schemas:
    AnalysisRequest:
      type: object
      properties:
        accountNumber: { type: string }
        accessKey: { type: string }
        secretKey: { type: string }
        connection: { type: string }
    AnalysisAccepted:
      type: object
      properties:
        analysisId: { type: string }
        status: { type: string }
    RecommendationList:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
    Recommendation:
      type: object
      properties:
        name: { type: string }
        currentType: { type: string }
        recommendedType: { type: string }
        currentCost: { type: number }
        recommendedCost: { type: number }
        savingsEstimate: { type: number }
    Cluster:
      type: object
      properties:
        name: { type: string }
        provider: { type: string }
        nodes: { type: integer }
    ContainerRecommendation:
      type: object
      properties:
        namespace: { type: string }
        workload: { type: string }
        container: { type: string }
        cpuRequest: { type: string }
        cpuLimit: { type: string }
        memoryRequest: { type: string }
        memoryLimit: { type: string }
        recommendedCpuRequest: { type: string }
        recommendedMemoryRequest: { type: string }

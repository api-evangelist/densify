name: Densify Capabilities
description: >-
  Capabilities exposed by the Densify cloud and container optimization platform
  through its public cloud and container REST APIs.
capabilities:
  - name: JWT Authorization
    description: Issue short-lived bearer tokens via /authorize for API calls.
    api: densify:public-cloud-api
  - name: Account Inventory
    description: List and inspect onboarded AWS, Azure, and GCP accounts.
    api: densify:public-cloud-api
  - name: Systems Inventory
    description: List virtual machines and instances under analysis.
    api: densify:public-cloud-api
  - name: Cloud Recommendations
    description: Retrieve right-sizing and rehosting recommendations for systems.
    api: densify:public-cloud-api
  - name: Savings Reporting
    description: Report current cost, recommended cost, and projected savings.
    api: densify:public-cloud-api
  - name: Analysis Status
    description: Inspect the freshness and status of optimization analyses.
    api: densify:public-cloud-api
  - name: Cluster Inventory
    description: List Kubernetes clusters across EKS, AKS, GKE, OpenShift, and on-prem.
    api: densify:container-api
  - name: Namespace Inventory
    description: Enumerate namespaces inside onboarded clusters.
    api: densify:container-api
  - name: Controller Recommendations
    description: Get container right-sizing recommendations per controller.
    api: densify:container-api
  - name: Container Right-Sizing
    description: Recommend CPU and memory requests and limits for each container group.
    api: densify:container-api
  - name: Densify Operator Integration
    description: Apply container recommendations via the open-source Densify operator.
    api: densify:container-api
  - name: Terraform Integration
    description: Pull recommendations into Terraform via the Densify provider.
    api: densify:public-cloud-api
  - name: CI/CD Optimization
    description: Embed recommendations into CI/CD pipelines for continuous optimization.
    api: densify:public-cloud-api
  - name: Postman Examples
    description: Use the published Postman collection to bootstrap integrations.
    api: densify:public-cloud-api
